<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#13110c">
<!-- ホーム画面に追加した時、アドレスバーなしの全画面アプリとして開くための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OKOSO">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>OKOSO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Zen+Old+Mincho:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --ink:#ede9df; --ink-2:#a89f8e; --ink-3:#6b6252; --ink-4:#3e3929;
    --bg:#13110c; --bg-1:#1a1812; --bg-2:#211f18;
    --rule:#252218; --rule-2:#2e2b21;
    --ember:#c47a3e; --ember-d:rgba(196,122,62,0.12); --ember-b:rgba(196,122,62,0.28);
    --serif:'Zen Old Mincho',serif; --sans:'Zen Kaku Gothic New',sans-serif; --mono:'DM Mono',monospace;
    --nav-h:64px;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{height:100%;}
  body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 40% at 50% -5%,rgba(196,122,62,0.08) 0%,transparent 70%);}

  .screen{position:fixed;inset:0 0 var(--nav-h);z-index:1;overflow-y:auto;overscroll-behavior:contain;display:none;}
  .screen.active{display:block;}
  .inner{max-width:480px;margin:0 auto;padding:0 26px 60px;}

  .mast{padding:calc(38px + env(safe-area-inset-top)) 0 0;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;}
  .mast-logo{font-family:var(--mono);font-size:11.5px;letter-spacing:0.44em;color:var(--ink-3);text-transform:uppercase;padding-left:0.44em;}
  .mast-date{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:0.06em;}
  .sync-badge{background:none;border:none;color:var(--ink-4);font-size:11px;cursor:pointer;padding:2px 4px;line-height:1;transition:color 0.3s;font-family:var(--mono);}
  .sync-badge.on{color:var(--ember);}
  .sync-badge.err{color:#c4603e;}
  .sync-status{font-family:var(--serif);font-size:13px;color:var(--ink-2);line-height:1.7;letter-spacing:0.03em;padding:12px 14px;background:var(--bg-2);border:1px solid var(--rule-2);border-radius:4px;}
  .sync-status.on{border-color:var(--ember-b);color:var(--ember);}
  .sync-copy{flex-shrink:0;background:var(--ember-d);border:1px solid var(--ember-b);color:var(--ember);font-family:var(--serif);font-size:12px;padding:7px 12px;border-radius:3px;cursor:pointer;}

  .label{font-family:var(--mono);font-size:10px;letter-spacing:0.3em;color:var(--ink-4);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
  .label::after{content:'';flex:1;height:1px;background:var(--rule-2);}

  /* ── 今日の一本線フロー（理想 → 目標 → 今月 → 今日） ── */
  .flow { padding: 6px 0 0; margin-bottom: 34px; }

  /* 上3段：コンパクトな行（左にラベル、右に内容） */
  .flow-mini {
    background: var(--bg-1); border: 1px solid var(--rule-2); border-radius: 4px;
    padding: 14px 18px; cursor: pointer; transition: border-color 0.3s;
    display: flex; flex-direction: column; gap: 7px;
  }
  .flow-mini:hover { border-color: var(--rule); }
  .flow-mini-lbl {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
    color: var(--ink-4); text-transform: uppercase; flex-shrink: 0;
    line-height: 1.4;
  }
  .flow-mini-body { font-family: var(--serif); font-size: 16px; line-height: 1.7; letter-spacing: 0.02em; color: var(--ink); }
  .flow-mini-body.empty { font-size: 13px; color: var(--ink-4); font-family: var(--sans); }

  /* 複数行対応（目標・今月の焦点） */
  .flow-multi { background: var(--bg-1); border: 1px solid var(--rule-2); border-radius: 4px; overflow: hidden; }
  .flow-multi-head { display: flex; align-items: center; padding: 10px 16px 6px; gap: 14px; }
  .flow-multi-lbl { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.18em; color: var(--ink-4); text-transform: uppercase; flex: 1; }
  .flow-multi-add { background: none; border: none; color: var(--ink-3); font-family: var(--serif); font-size: 11.5px; cursor: pointer; letter-spacing: 0.04em; padding: 2px 4px; transition: color 0.25s; }
  .flow-multi-add:hover { color: var(--ember); }
  .flow-multi-row { display: flex; align-items: center; gap: 11px; padding: 9px 16px; border-top: 1px solid var(--rule); transition: background 0.2s; }
  .flow-multi-row:hover { background: var(--bg-2); }
  .flow-multi-chk { flex-shrink:0; width:18px; height:18px; border-radius:50%; border:1.5px solid var(--ink-4); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.3s; padding:0; }
  .flow-multi-chk:hover { border-color:var(--ember); }
  .flow-multi-chk svg { opacity:0; transition:opacity 0.3s; }
  .flow-multi-chk:hover svg { opacity:0.6; }
  .flow-multi-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ember); opacity: 0.6; flex-shrink: 0; }
  .flow-multi-text { font-family: var(--serif); font-size: 14px; color: var(--ink); flex: 1; min-width: 0; letter-spacing: 0.02em; cursor: pointer; }
  .flow-multi-empty { padding: 11px 16px; border-top: 1px solid var(--rule); font-family: var(--sans); font-size: 12px; color: var(--ink-4); cursor: pointer; }
  .flow-multi-empty:hover { color: var(--ember); }

  /* 細い縦線（矢印なしで圧縮） */
  .flow-tick { width: 1px; height: 14px; background: var(--rule-2); margin: 0 auto; }

  /* 今日の一歩（主役・通常サイズ） */
  .flow-node-steps {
    background: var(--bg-1); border: 1px solid var(--ember-b); border-radius: 4px;
    padding: 18px 20px; margin-top: 2px;
  }
  .flow-node-lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.26em; color: var(--ember); text-transform: uppercase; margin-bottom: 10px; }
  .flow-steps-lead { font-family: var(--serif); font-size: 13px; color: var(--ink-3); margin-bottom: 14px; line-height: 1.9; letter-spacing: 0.04em; }
  .step-row { display: flex; align-items: flex-start; gap: 13px; padding: 12px 0; border-top: 1px solid var(--rule); }
  .step-row:first-of-type { border-top: none; padding-top: 0; }
  .chk { flex-shrink:0; margin-top:2px; width:20px; height:20px; border-radius:50%; border:1.5px solid var(--ink-4); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.4s,background 0.4s; }
  .chk.done { border-color:var(--ember); background:var(--ember-d); }
  .chk svg { opacity:0; transition:opacity 0.35s; }
  .chk.done svg { opacity:1; }
  .step-info { flex:1; min-width:0; }
  .step-t { font-size:15px; line-height:1.6; transition:color 0.4s; }
  .step-t.done { color:var(--ink-3); text-decoration:line-through; text-decoration-color:var(--ink-4); }
  .step-tag { font-family:var(--mono); font-size:10px; color:var(--ink-4); margin-top:4px; letter-spacing:0.04em; }
  .step-del { background:none; border:none; color:var(--ink-4); font-size:16px; cursor:pointer; padding:2px 4px; line-height:1; }
  .add-btn { display:flex; align-items:center; gap:8px; margin-top:14px; padding:10px 0 0; border-top:1px dashed var(--rule-2); background:none; border-left:none; border-right:none; border-bottom:none; color:var(--ink-3); font-family:var(--serif); font-size:13px; letter-spacing:0.06em; cursor:pointer; width:100%; text-align:left; transition:color 0.3s; }
  .add-btn span { color:var(--ember); font-size:16px; }
  .add-btn:hover { color:var(--ember); }

  /* 夜の記録ブロック */
  .dusk-block { border-top: 1px solid var(--rule); padding-top: 32px; }

  /* ── dusk ── */
  .dusk-tabs{display:flex;gap:8px;margin-bottom:16px;}
  .dtab{flex:1;padding:10px 8px;background:var(--bg-1);border:1px solid var(--rule-2);color:var(--ink-3);font-family:var(--serif);font-size:12.5px;letter-spacing:0.08em;border-radius:3px;cursor:pointer;transition:all 0.3s;}
  .dtab.on{color:var(--ember);border-color:var(--ember-b);background:var(--ember-d);}
  .dusk-hint{font-family:var(--serif);font-size:12.5px;color:var(--ink-3);line-height:1.9;margin-bottom:14px;letter-spacing:0.04em;}

  /* 役割の宣言カード（前進記録／ジャーナルの違いを明示） */
  .role-card{background:var(--bg-1);border:1px solid var(--rule-2);border-radius:4px;padding:14px 16px;margin-bottom:16px;}
  .role-title{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);letter-spacing:0.04em;margin-bottom:7px;}
  .role-sub{font-family:var(--serif);font-size:12px;color:var(--ink-3);line-height:1.85;letter-spacing:0.03em;}
  .role-key{color:var(--ember);font-weight:500;}

  /* 前進ログ入力：既存項目チップ＋新規 */
  .asset-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .asset-chip{padding:8px 14px;border:1px solid var(--rule-2);border-radius:100px;background:var(--bg-1);color:var(--ink-2);font-size:13px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:6px;}
  .asset-chip .cnt{font-family:var(--mono);font-size:10px;color:var(--ink-4);}
  .asset-chip.on{border-color:var(--ember-b);background:var(--ember-d);color:var(--ember);}
  .asset-chip.new{border-style:dashed;color:var(--ink-3);}
  .log-input-row{display:flex;gap:10px;align-items:flex-end;border-bottom:1px solid var(--rule-2);padding-bottom:14px;}
  .log-input-row.hidden{display:none;}
  .amt-box{display:flex;align-items:baseline;gap:6px;flex:1;}
  .amt-box input{width:100%;background:transparent;border:none;outline:none;color:var(--ink);font-family:var(--serif);font-size:24px;font-weight:500;}
  .amt-box input::placeholder{color:var(--ink-4);font-weight:300;}
  .amt-unit{font-family:var(--serif);font-size:14px;color:var(--ink-3);flex-shrink:0;}
  .compose{display:flex;flex-direction:column;gap:14px;border-bottom:1px solid var(--rule-2);padding-bottom:16px;}
  .compose textarea{width:100%;background:transparent;border:none;outline:none;resize:none;color:var(--ink);font-family:var(--sans);font-weight:300;font-size:16px;line-height:1.85;min-height:80px;}
  .compose textarea::placeholder{color:var(--ink-4);}
  .compose .keep-btn{align-self:flex-end;}
  .keep-btn{flex-shrink:0;background:transparent;border:1px solid var(--rule-2);color:var(--ink-3);font-family:var(--serif);font-size:13px;letter-spacing:0.1em;padding:9px 18px;border-radius:2px;cursor:pointer;transition:all 0.4s;}
  .keep-btn.on{border-color:var(--ember-b);color:var(--ember);}
  .log-current-label{font-family:var(--serif);font-size:14px;color:var(--ink-2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .log-current-label .back{font-family:var(--mono);font-size:11px;color:var(--ink-4);cursor:pointer;}

  /* ── Layer2: 前進の証 ── */
  /* 理想の北極星（資産の上に置く本当の主役） */
  .proof-north{padding:10px 0 30px;}
  .proof-north-label{font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--ember);text-transform:uppercase;margin-bottom:14px;text-align:center;}
  .proof-north-ideal{font-family:var(--serif);font-size:21px;font-weight:500;line-height:1.7;color:var(--ink);letter-spacing:0.04em;text-align:center;margin-bottom:18px;}
  .proof-north-theme{background:var(--bg-1);border:1px solid var(--rule-2);border-radius:4px;padding:13px 18px;display:flex;align-items:center;gap:12px;justify-content:center;}
  .proof-north-theme .tlbl{font-family:var(--mono);font-size:9px;color:var(--ink-4);letter-spacing:0.16em;}
  .proof-north-theme .ttxt{font-family:var(--serif);font-size:14px;color:var(--ink-2);letter-spacing:0.04em;}
  .proof-north-empty{text-align:center;font-family:var(--serif);font-size:14px;color:var(--ink-3);line-height:2;}
  .proof-asset-note{font-family:var(--serif);font-size:12px;color:var(--ink-4);margin:-6px 0 16px;letter-spacing:0.04em;}

  .asset-card{background:var(--bg-1);border:1px solid var(--rule-2);border-radius:4px;padding:18px 20px;margin-bottom:10px;}

  /* 達成資産カード */
  .achieve-list{display:flex;flex-direction:column;gap:8px;}
  .achieve-card{background:var(--bg-1);border:1px solid var(--rule-2);border-radius:4px;padding:14px 16px;display:flex;align-items:center;gap:13px;}
  .achieve-check{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1px solid var(--ember-b);background:var(--ember-d);display:flex;align-items:center;justify-content:center;}
  .achieve-body{flex:1;min-width:0;display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .achieve-text{font-family:var(--serif);font-size:15px;color:var(--ink);letter-spacing:0.03em;}
  .achieve-date{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:0.04em;flex-shrink:0;}
  .asset-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .asset-name{font-family:var(--serif);font-size:17px;font-weight:500;letter-spacing:0.04em;}
  .asset-times{font-family:var(--mono);font-size:10.5px;color:var(--ink-4);letter-spacing:0.04em;}
  .asset-menu-btn{flex-shrink:0;background:none;border:none;color:var(--ink-4);font-size:16px;cursor:pointer;padding:2px 6px;letter-spacing:0.1em;line-height:1;transition:color 0.25s;}
  .asset-menu-btn:hover{color:var(--ember);}
  .asset-total{font-family:var(--serif);font-weight:600;line-height:1;display:flex;align-items:baseline;gap:6px;margin-bottom:18px;}
  .asset-total .num{font-size:40px;color:var(--ink);font-feature-settings:"tnum";}
  .asset-total .u{font-size:16px;color:var(--ink-3);font-weight:400;}
  /* 変化量（累計の下に4期間を縦に並べて見せる＝読みやすさ優先） */
  .asset-changes-col{border-top:1px solid var(--rule);padding-top:14px;display:flex;flex-direction:column;gap:10px;}
  .change-row{display:flex;justify-content:space-between;align-items:baseline;}
  .change-span{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:0.08em;}
  .change-val{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ember);font-feature-settings:"tnum";}
  .change-val.zero{color:var(--ink-4);font-weight:400;}
  .recent-entry{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--rule);align-items:center;}
  .log-menu-btn{flex-shrink:0;background:none;border:none;color:var(--ink-4);font-size:15px;cursor:pointer;padding:4px 6px;letter-spacing:0.1em;line-height:1;transition:color 0.25s;}
  .log-menu-btn:hover{color:var(--ember);}
  .recent-day{flex-shrink:0;width:64px;font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:0.04em;}
  .recent-text{font-size:15px;line-height:1.7;flex:1;min-width:0;}
  .jrnl-card{background:var(--bg-1);border:1px solid var(--rule-2);border-left:2px solid var(--ember-b);border-radius:0 4px 4px 0;padding:18px 18px;margin-bottom:12px;}
  /* 達成カードをタップ可能に */
  .achieve-tappable{cursor:pointer;transition:border-color 0.25s;}
  .achieve-tappable:hover{border-color:var(--ember-b);}
  /* ジャーナルのメニュー */
  .jrnl-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
  .jrnl-menu-btn{background:none;border:none;color:var(--ink-4);font-size:15px;cursor:pointer;padding:2px 6px;letter-spacing:0.1em;line-height:1;transition:color 0.25s;}
  .jrnl-menu-btn:hover{color:var(--ember);}

  /* 前進の翻訳（未来の自分からの手紙） */
  .translation{margin-top:40px;padding-top:32px;border-top:1px solid var(--rule);}
  .translation-card{background:linear-gradient(180deg,var(--ember-d),transparent 80%);border:1px solid var(--ember-b);border-radius:5px;padding:26px 24px;}
  .translation-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:0.3em;color:var(--ember);text-transform:uppercase;margin-bottom:14px;text-align:center;}
  .translation-title{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--ink);letter-spacing:0.05em;text-align:center;line-height:1.6;margin-bottom:22px;}
  .translation-body{font-family:var(--serif);font-size:14.5px;line-height:2.15;color:var(--ink-2);letter-spacing:0.03em;white-space:pre-wrap;}
  .translation-sign{font-family:var(--serif);font-size:11px;color:var(--ink-4);letter-spacing:0.08em;text-align:right;margin-top:22px;font-style:italic;}
  .translation-loading{font-family:var(--serif);font-size:13px;color:var(--ink-3);text-align:center;padding:20px;letter-spacing:0.06em;}

  /* 人生の方向転換カード */
  .shift-card{background:linear-gradient(180deg,var(--ember-d),transparent);border:1px solid var(--ember-b);border-radius:5px;padding:20px;margin-bottom:18px;text-align:center;}
  .shift-card-label{font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--ember);text-transform:uppercase;margin-bottom:16px;}
  .shift-flow{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;}
  .shift-from{font-family:var(--serif);font-size:14px;color:var(--ink-3);text-decoration:line-through;text-decoration-color:var(--ink-4);letter-spacing:0.03em;}
  .shift-arrow{font-size:9px;color:var(--ember);opacity:0.7;}
  .shift-to{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--ink);letter-spacing:0.03em;line-height:1.5;}
  .shift-note{font-family:var(--serif);font-size:11px;color:var(--ink-4);letter-spacing:0.04em;line-height:1.8;}
  .jrnl-text{font-family:var(--serif);font-size:14px;color:var(--ink-2);line-height:1.85;letter-spacing:0.02em;}
  .jrnl-date{font-family:var(--mono);font-size:9.5px;color:var(--ink-4);margin-top:8px;letter-spacing:0.06em;}

  /* ── Layer3: アーカイブ ── */
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .cal-nav{background:none;border:none;color:var(--ink-3);font-size:18px;cursor:pointer;padding:4px 10px;font-family:var(--serif);}
  .cal-title{font-family:var(--serif);font-size:16px;letter-spacing:0.08em;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;}
  .cal-dow{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink-4);padding-bottom:6px;}
  .cal-cell{aspect-ratio:1;border:none;background:transparent;border-radius:7px;color:var(--ink-3);font-family:var(--mono);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:background 0.2s;}
  .cal-cell:disabled{opacity:0;cursor:default;}
  .cal-cell.has{background:var(--bg-1);color:var(--ink);}
  .cal-cell.today-cell{border:1px solid var(--ember-b);}
  .cal-mark{width:4px;height:4px;border-radius:50%;background:var(--ember);}
  .cal-detail{margin-top:24px;}
  .cal-detail-date{font-family:var(--serif);font-size:15px;color:var(--ink-2);margin-bottom:14px;letter-spacing:0.06em;}

  /* ── nav ── */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:10;height:var(--nav-h);background:rgba(19,17,12,0.96);backdrop-filter:blur(12px);border-top:1px solid var(--rule-2);display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom);}
  .nav-inner{width:100%;max-width:480px;display:flex;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:8px 0;}
  .nav-btn svg{opacity:0.35;transition:opacity 0.25s;color:var(--ink-2);}
  .nav-label{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;color:var(--ink-3);opacity:0.45;transition:opacity 0.25s;}

<script>
// ════════════════════════════════
//  STATE
// ════════════════════════════════
const STORE='okoso_v15';
let S = {
  ideal: '',                   // Layer0 理想（北極星・単一テキスト）
  idealHistory: [],            // 理想の変遷
  goals: [],                   // 未達成の目標 [{id,text}]
  monthFocuses: [],            // 未達成の今月の焦点 [{id,text}]
  achievedGoals: [],           // 達成した目標 [{id,text,doneTs}]
  achievedFocuses: [],         // 達成した今月の焦点 [{id,text,doneTs,ym}]
  steps: {},
  assets: {},
  logs: [],
  journals: [],
  stepDecisions: [],           // 未達タスクの意思決定 [{id,text,date,decision,ts,reflection?}]
  translations: {},            // 前進の翻訳 {7:{text,ts,days},30:{...},...}
  onboarded: false,
  lastRolloverCheck: '',       // 最後に未達タスク確認をした日付キー
  updatedAt: 0                 // このデータの最終更新時刻（同期のマージ判定に使う）
};
function load(){ try{const r=localStorage.getItem(STORE); if(r) S={...S,...JSON.parse(r)};}catch(e){} }
function persist(){
  S.updatedAt = Date.now();
  try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}
  schedulePush();            // 変更があればGistへ（デバウンス）
}

// ════════════════════════════════
//  GitHub Gist 同期
// ════════════════════════════════
// 設定（トークン・gistID）は同期しない。各端末のlocalStorageに別キーで保持。
const SYNC_KEY='okoso_sync_cfg';
let sync = { token:'', gistId:'', enabled:false, lastSync:0 };
function loadSync(){ try{const r=localStorage.getItem(SYNC_KEY); if(r) sync={...sync,...JSON.parse(r)};}catch(e){} }
function saveSync(){ try{localStorage.setItem(SYNC_KEY,JSON.stringify(sync));}catch(e){} }

const GIST_FILENAME='okoso-data.json';
let syncing=false, pushTimer=null;

function schedulePush(){
  if(!sync.enabled||!sync.token||!sync.gistId) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{ pushToGist().catch(()=>{}); }, 1500);
}

async function gistHeaders(){
  return { 'Authorization':`token ${sync.token}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' };
}

// 新規Gistを作成してIDを返す
async function createGist(){
  const res=await fetch('https://api.github.com/gists',{
    method:'POST', headers:await gistHeaders(),
    body:JSON.stringify({ description:'OKOSO data (do not delete)', public:false, files:{ [GIST_FILENAME]:{ content:JSON.stringify(S) } } })
  });
  if(!res.ok) throw new Error('create_failed:'+res.status);
  const data=await res.json();
  return data.id;
}

// Gistから読み込む
async function pullFromGist(){
  const res=await fetch(`https://api.github.com/gists/${sync.gistId}`,{ headers:await gistHeaders() });
  if(!res.ok) throw new Error('pull_failed:'+res.status);
  const data=await res.json();
  const f=data.files&&data.files[GIST_FILENAME];
  if(!f) return null;
  let content=f.content;
  // truncatedの場合はraw_urlから取得
  if(f.truncated&&f.raw_url){ const r=await fetch(f.raw_url); content=await r.text(); }
  try{ return JSON.parse(content); }catch(e){ return null; }
}

// Gistへ書き込む
async function pushToGist(){
  if(syncing) return;
  syncing=true; updateSyncBadge('pushing');
  try{
    const res=await fetch(`https://api.github.com/gists/${sync.gistId}`,{
      method:'PATCH', headers:await gistHeaders(),
      body:JSON.stringify({ files:{ [GIST_FILENAME]:{ content:JSON.stringify(S) } } })
    });
    if(!res.ok) throw new Error('push_failed:'+res.status);
    sync.lastSync=Date.now(); saveSync(); updateSyncBadge('ok');
  }catch(e){ updateSyncBadge('error'); throw e; }
  finally{ syncing=false; }
}

// ── マージ：項目ごとに新しい方を残す（追記型はID重複排除で両方残す）──
function mergeData(local, remote){
  if(!remote) return local;
  if(!local) return remote;
  const out=JSON.parse(JSON.stringify(local));

  // 追記型（logs / journals / idealHistory / achievedGoals / achievedFocuses）：IDで重複排除して両方残す
  const mergeById=(a=[],b=[],idKey='id')=>{
    const map=new Map();
    [...a,...b].forEach(x=>{ const k=x[idKey]||JSON.stringify(x); if(!map.has(k)) map.set(k,x); });
    return [...map.values()].sort((x,y)=>(x.ts||x.doneTs||0)-(y.ts||y.doneTs||0));
  };
  out.logs=mergeById(local.logs,remote.logs);
  out.journals=mergeById(local.journals,remote.journals);
  out.idealHistory=mergeById(local.idealHistory,remote.idealHistory,'ts');
  out.achievedGoals=mergeById(local.achievedGoals,remote.achievedGoals);
  out.achievedFocuses=mergeById(local.achievedFocuses,remote.achievedFocuses);
  out.stepDecisions=mergeById(local.stepDecisions,remote.stepDecisions);

  // steps（日付キーごと）：日付単位で、未達成リストはIDマージ
  out.steps={...remote.steps,...local.steps};
  const allDays=new Set([...Object.keys(local.steps||{}),...Object.keys(remote.steps||{})]);
  allDays.forEach(d=>{ out.steps[d]=mergeById(local.steps&&local.steps[d],remote.steps&&remote.steps[d]); });

  // assets（台帳）：項目ごとに、記録(logs)から再集計する方が正確なので、logsベースで作り直す
  out.assets=rebuildAssetsFromLogs(out.logs, {...remote.assets,...local.assets});

  // translations：節目ごとに先に生成された方を残す
  out.translations={...remote.translations,...local.translations};

  // スカラー項目（理想・目標・焦点・onboarded）：updatedAtが新しい方を採用
  const newer = (remote.updatedAt||0) > (local.updatedAt||0) ? remote : local;
  out.ideal=newer.ideal;
  out.goals=newer.goals;
  out.monthFocuses=newer.monthFocuses;
  out.onboarded=local.onboarded||remote.onboarded;
  out.updatedAt=Math.max(local.updatedAt||0, remote.updatedAt||0);
  return out;
}

// logsから資産の累計・回数を再構築（unitは既存定義を優先）
function rebuildAssetsFromLogs(logs, existingAssets){
  const assets={};
  // まず既存のunit定義・firstTsを引き継ぐ
  Object.keys(existingAssets||{}).forEach(n=>{ assets[n]={unit:existingAssets[n].unit||'', total:0, count:0, firstTs:existingAssets[n].firstTs||Date.now()}; });
  logs.forEach(l=>{
    if(!assets[l.item]) assets[l.item]={unit:l.unit||'', total:0, count:0, firstTs:l.ts};
    assets[l.item].count+=1;
    if(l.amount!=null) assets[l.item].total+=l.amount;
    if(l.ts<assets[l.item].firstTs) assets[l.item].firstTs=l.ts;
  });
  return assets;
}

// 同期を有効化（初回セットアップ）
async function enableSync(token, gistId){
  sync.token=token.trim();
  if(gistId&&gistId.trim()){
    sync.gistId=gistId.trim();
  } else {
    sync.gistId=await createGist();   // 新規作成
  }
  sync.enabled=true; saveSync();
  // 初回：リモートとマージ
  await syncNow();
  return sync.gistId;
}

// 今すぐ同期（pull → merge → push）
async function syncNow(){
  if(!sync.enabled||!sync.token||!sync.gistId) return;
  syncing=true; updateSyncBadge('pulling');
  try{
    const remote=await pullFromGist();
    const merged=mergeData(S, remote);
    S=merged;
    try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}
    // 画面再描画
    renderFlow(); renderAssetChips();
    if(document.getElementById('scr-proof').classList.contains('active')) renderProof();
    if(document.getElementById('scr-archive').classList.contains('active')) renderCalendar();
    syncing=false;
    await pushToGist();   // マージ結果を書き戻す
    sync.lastSync=Date.now(); saveSync(); updateSyncBadge('ok');
  }catch(e){ syncing=false; updateSyncBadge('error'); throw e; }
}

function updateSyncBadge(state){
  const el=document.getElementById('sync-badge');
  if(!el) return;
  const map={ ok:'●', pushing:'↑', pulling:'↓', error:'!', off:'○' };
  el.textContent=map[state]||'○';
  el.className='sync-badge '+(state==='error'?'err':state==='ok'?'on':'');
}

// 相対日付
function relDay(ts){
  const a=new Date(dk(new Date(ts))), b=new Date(dk());
  const diff=Math.round((b-a)/86400000);
  if(diff===0)return '今日'; if(diff===1)return '昨日'; if(diff===2)return '2日前'; if(diff===3)return '3日前';
  const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()}`;
}

// 達成：未達成リストから達成資産へ移動
function achieveItem(kind, id){
  const now=Date.now();
  if(kind==='goal'){
    const i=S.goals.findIndex(x=>x.id===id);
    if(i<0) return;
    const g=S.goals[i];
    if(!S.achievedGoals) S.achievedGoals=[];
    S.achievedGoals.push({id:g.id, text:g.text, doneTs:now});
    S.goals.splice(i,1);
    S.journals.push({id:uid(), text:`目標を達成した。\n「${g.text}」`, ts:now, kind:'achieve'});
    persist(); renderFlow();
    showAchieveCelebrate('目標 達成', g.text);
  } else {
    const i=S.monthFocuses.findIndex(x=>x.id===id);
    if(i<0) return;
    const f=S.monthFocuses[i];
    const d=new Date(now);
    const ym=`${d.getFullYear()}.${('0'+(d.getMonth()+1)).slice(-2)}`;
    if(!S.achievedFocuses) S.achievedFocuses=[];
    S.achievedFocuses.push({id:f.id, text:f.text, doneTs:now, ym});
    S.monthFocuses.splice(i,1);
    S.journals.push({id:uid(), text:`今月の焦点を達成した。\n「${f.text}」`, ts:now, kind:'achieve'});
    persist(); renderFlow();
    showAchieveCelebrate('今月の焦点 達成', f.text);
  }
}

      if(!S.idealHistory) S.idealHistory=[];

      S.idealHistory.push({ from:S.ideal, to:next, ts:now });

function doKeepLog(){

  const name=activeItem;
  const a=S.assets[name];
  const raw=document.getElementById('amt-inp').value.trim();
  let amount = raw ? parseFloat(raw) : null;

  const before={count:a.count,total:a.total,unit:a.unit};

}

function editLog(id){
  const l=S.logs.find(x=>x.id===id);
  if(!l) return;
  const hasUnit=!!l.unit;
  window.saveEditLog=()=>{
    const raw=(document.getElementById('edit-amt').value||'').trim();
    let amount = raw ? parseFloat(raw) : null;
    if(amount==null||isNaN(amount)||amount<=0) amount=null;
    // 資産の累計を差し替え（旧amount引く→新amount足す）
    const a=S.assets[l.item];
    if(a){
      if(l.amount!=null) a.total-=l.amount;
      if(amount!=null) a.total+=amount;
      if(a.total<0) a.total=0;
    }
    l.amount=amount;
    persist(); renderAssetChips(); renderProof(); closeModal();
    quietToast('記録を直しました');
  };
  openSheet(`<h2>記録を編集</h2>
    <p class="sheet-note">${esc(l.item)}${hasUnit?`（${esc(l.unit)}）`:''}</p>
    <label class="field-lbl">数値${hasUnit?'':'（任意）'}</label>
    <div class="field-box"><input type="number" id="edit-amt" step="any" value="${l.amount!=null?l.amount:''}" placeholder="数値"></div>
    <div class="sheet-btns"><button class="sbtn" onclick="closeModal()">閉じる</button><button class="sbtn sbtn-p" onclick="saveEditLog()">更新する</button></div>`);

}

function confirmDeleteLog(id){
  const l=S.logs.find(x=>x.id===id);
  if(!l) return;
  window.doDeleteLog=()=>{
    const a=S.assets[l.item];
    if(a){
      a.count-=1;
      if(l.amount!=null) a.total-=l.amount;
      if(a.count<0) a.count=0;
      if(a.total<0) a.total=0;
      // この項目の記録が0件になっても枠は残す（台帳思想）

    const i=S.logs.findIndex(x=>x.id===id);
    if(i>=0) S.logs.splice(i,1);
    persist(); renderAssetChips(); renderProof(); closeModal();
    quietToast('記録を削除しました');
  };
  openSheet(`<h2>本当に削除しますか？</h2>
    <p class="sheet-note">「${esc(l.item)}${l.amount!=null?` ${fmtNum(l.amount)}${esc(l.unit||'')}`:''}」を削除します。<br>この操作は取り消せません。</p>

function editAsset(name){
  const a=S.assets[name];
  if(!a) return;
  window.saveEditAsset=()=>{
    const newName=(document.getElementById('asset-name').value||'').trim();
    const newUnit=(document.getElementById('asset-unit').value||'').trim();
    if(!newName){ quietToast('名前を入力してください'); return; }
    // 単位の変更
    a.unit=newUnit;
    // 名前の変更（キーの付け替え＋logs内のitem名も更新）
    if(newName!==name){
      if(S.assets[newName]){
        // 既存項目と統合
        S.assets[newName].total+=a.total;
        S.assets[newName].count+=a.count;
        if(a.firstTs<S.assets[newName].firstTs) S.assets[newName].firstTs=a.firstTs;
      } else {
        S.assets[newName]=a;
      }
      delete S.assets[name];
      S.logs.forEach(l=>{ if(l.item===name){ l.item=newName; l.unit=newUnit; } });
    } else {
      S.logs.forEach(l=>{ if(l.item===name){ l.unit=newUnit; } });
    }
    persist(); renderAssetChips(); renderProof(); closeModal();
    quietToast('項目を直しました');
  };
  openSheet(`<h2>項目を編集</h2>
    <label class="field-lbl">名前</label>
    <div class="field-box"><input type="text" id="asset-name" value="${esc(name)}"></div>

}

// ── 保存演出（カウントアップ → 前進の証へ）──
function showCelebrate(name, before, after, amount){
  const mount=document.getElementById('celebrate-mount');
  const unit=after.unit;
  mount.innerHTML=`<div class="celebrate" id="celebrate">
    <div class="celebrate-label">前進の証</div>
    <div class="cele-asset">
      <div class="cele-asset-name">${esc(name)}</div>
      <div class="cele-asset-nums">
        <span class="cele-from">${before.count}</span>
        <span class="cele-arrow">→</span>
        <span class="cele-to" id="cele-to">${before.count}<span class="u">回</span></span>
      </div>
      ${unit?`<div class="cele-total" id="cele-total">累計 ${fmtNum(before.total)}${unit}</div>`:''}
    </div>
    <div class="cele-hint">タップして閉じる</div>
  </div>`;
  const cele=document.getElementById('celebrate');
  cele.addEventListener('click',()=>{ cele.classList.remove('show'); setTimeout(()=>{mount.innerHTML='';},500); });
  requestAnimationFrame(()=>cele.classList.add('show'));
  // カウントアップ
  setTimeout(()=>{
    animateCount('cele-to', before.count, after.count, '回');
    if(unit) animateTotal('cele-total', before.total, after.total, unit);
  }, 600);
  // 4.5秒で自動的に閉じる
  setTimeout(()=>{ if(document.getElementById('celebrate')){ cele.classList.remove('show'); setTimeout(()=>{mount.innerHTML='';},500);} }, 4500);
}
function animateCount(id,from,to,unit){
  const el=document.getElementById(id); if(!el)return;
  const dur=700,t0=performance.now();
  function tick(t){const p=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-p,3);const v=Math.round(from+(to-from)*e);el.innerHTML=`${v}<span class="u">${unit}</span>`;if(p<1)requestAnimationFrame(tick);}
  requestAnimationFrame(tick);
}
function animateTotal(id,from,to,unit){
  const el=document.getElementById(id); if(!el)return;
  const dur=700,t0=performance.now();
  function tick(t){const p=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-p,3);const v=from+(to-from)*e;el.textContent=`累計 ${fmtNum(Math.round(v*10)/10)}${unit}`;if(p<1)requestAnimationFrame(tick);}
  requestAnimationFrame(tick);
}

function quietToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;left:50%;bottom:calc(var(--nav-h) + 24px);transform:translateX(-50%);background:var(--bg-2);border:1px solid var(--rule-2);color:var(--ink-2);font-family:var(--serif);font-size:13px;padding:11px 22px;border-radius:100px;z-index:40;opacity:0;transition:opacity 0.4s;letter-spacing:0.06em;';
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},1800);
}

// 期間内の項目別増分を集計
function periodDelta(name, days){
  const cutoff = Date.now()-days*86400000;
  let count=0, total=0;
  S.logs.forEach(l=>{
    if(l.item!==name || l.ts<cutoff) return;
    count+=1; if(l.amount!=null) total+=l.amount;
  });
  return {count, total};
}

function renderProof(){
  const names=Object.keys(S.assets);

  // ── 北極星：理想を資産の上に置く ──
  const north=document.getElementById('proof-north');
  const goalsTxt = (S.goals||[]).map(g=>g.text).join('・');
  const monthTxt = (S.monthFocuses||[]).map(f=>f.text).join('・');
  if(S.ideal || goalsTxt || monthTxt){
    north.innerHTML = `
      <div class="proof-north-label">理想の姿</div>
      ${S.ideal ? `<div class="proof-north-ideal">${esc(S.ideal)}</div>` : '<div class="proof-north-ideal" style="color:var(--ink-3);font-size:16px">理想は、まだ描かれていません</div>'}
      ${goalsTxt||monthTxt ? `<div class="proof-north-theme">${goalsTxt?`<span class="tlbl">目標</span><span class="ttxt">${esc(goalsTxt)}</span>`:''}${goalsTxt&&monthTxt?'<span style="color:var(--ink-4);margin:0 4px">·</span>':''}${monthTxt?`<span class="tlbl">今月</span><span class="ttxt">${esc(monthTxt)}</span>`:''}</div>` : ''}`;
  } else {
    north.innerHTML = `<div class="proof-north-empty">理想を描くと、<br>積み上げが「証拠」に変わります。</div>`;
  }

  // 注記
  document.getElementById('proof-asset-note').textContent = names.length
    ? '数字が、未来のあなたの自信になる。' : '';

  // ── 達成した目標（目標達成資産）──
  const agEl=document.getElementById('achieved-goals-section');
  const ag=(S.achievedGoals||[]).slice().sort((a,b)=>b.doneTs-a.doneTs);
  if(ag.length){
    agEl.innerHTML=`<div class="label">達成した目標</div>
      <p class="proof-asset-note">あなたが、成し遂げてきたこと。</p>
      <div class="achieve-list">${ag.map(g=>`
        <div class="achieve-card achieve-tappable" onclick="openAchievedMenu('goal','${g.id}')">
          <div class="achieve-check"><svg width="11" height="9" viewBox="0 0 11 9"><polyline points="1 4.5 4 7.5 10 1" fill="none" stroke="var(--ember)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="achieve-body"><div class="achieve-text">${esc(g.text)}</div><div class="achieve-date">${fmtYMD(g.doneTs)}</div></div>
        </div>`).join('')}</div>
      <div style="height:32px"></div>`;
  } else agEl.innerHTML='';

  // ── 達成した今月の焦点（焦点達成資産）──
  const afEl=document.getElementById('achieved-focuses-section');
  const af=(S.achievedFocuses||[]).slice().sort((a,b)=>b.doneTs-a.doneTs);
  if(af.length){
    afEl.innerHTML=`<div class="label">達成した今月の焦点</div>
      <p class="proof-asset-note">今年、ここまで前に進んだ。</p>
      <div class="achieve-list">${af.map(f=>`
        <div class="achieve-card achieve-tappable" onclick="openAchievedMenu('focus','${f.id}')">
          <div class="achieve-check"><svg width="11" height="9" viewBox="0 0 11 9"><polyline points="1 4.5 4 7.5 10 1" fill="none" stroke="var(--ember)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="achieve-body"><div class="achieve-text">${esc(f.text)}</div><div class="achieve-date">${f.ym||fmtYMD(f.doneTs)}</div></div>
        </div>`).join('')}</div>
      <div style="height:32px"></div>`;
  } else afEl.innerHTML='';

  // ── 前進資産（累計＋変化量を同時に見せる）──
  const al=document.getElementById('asset-list');
  if(!names.length){
    al.innerHTML='<div class="empty-msg">まだ積み上げはありません。\n今日、最初の前進記録を残してみてください。</div>';
  } else {
    al.innerHTML=names.map(n=>{
      const a=S.assets[n];
      const unit=a.unit;
      const cumLabel = unit ? `${fmtNum(a.total)}` : `${a.count}`;
      const cumUnit  = unit ? esc(unit) : '回';
      // 変化量：30 / 90 / 180 / 1年
      const spans=[{lbl:'30日',d:30},{lbl:'90日',d:90},{lbl:'180日',d:180},{lbl:'1年',d:365}];
      const changeCells = spans.map(s=>{
        const dlt=periodDelta(n,s.d);
        const v = unit ? dlt.total : dlt.count;
        const u = unit ? esc(unit) : '回';
        const zero = v<=0;
        return `<div class="change-row"><span class="change-span">${s.lbl}</span><span class="change-val${zero?' zero':''}">${zero?'—':'+'+fmtNum(v)+u}</span></div>`;
      }).join('');
      return `<div class="asset-card">
        <div class="asset-top"><span class="asset-name">${esc(n)}</span><button class="asset-menu-btn" onclick="openAssetMenu('${esc(n)}')">···</button></div>
        <div class="asset-total"><span class="num">${cumLabel}</span><span class="u">${cumUnit}</span></div>
        <div class="asset-changes-col">${changeCells}</div>
      </div>`;
    }).join('');
  }

  // 最近の前進（各ログに ・・・ メニュー）
  const rl=document.getElementById('recent-list');
  const recent=S.logs.slice().reverse().slice(0,8);
  rl.innerHTML = !recent.length ? '<div class="empty-msg" style="padding-top:0">まだ記録はありません。</div>'
    : recent.map(l=>`<div class="recent-entry">
        <div class="recent-day">${relDay(l.ts)}</div>
        <div class="recent-text">${esc(l.item)}${l.amount!=null?` ${fmtNum(l.amount)}${esc(l.unit||'')}`:''}</div>
        <button class="log-menu-btn" onclick="openLogMenu('${l.id}')">···</button>
      </div>`).join('');

  // 最近のことば（ジャーナル・方向転換を含む）
  const jl=document.getElementById('recent-journals');
  const rj=S.journals.slice().reverse().slice(0,3);
  jl.innerHTML = !rj.length ? '<div class="empty-msg" style="padding-top:0">まだことばはありません。</div>'
    : rj.map(j=> j.kind==='shift'

        : j.kind==='achieve'
        ? `<div class="jrnl-card" style="border-left-color:var(--ember)"><div class="jrnl-text" style="white-space:pre-wrap">${esc(j.text)}</div><div class="jrnl-date">達成 ・ ${relDay(j.ts)}</div></div>`
        : `<div class="jrnl-card"><div class="jrnl-text">${esc(j.text)}</div><div class="jrnl-foot"><span class="jrnl-date">${relDay(j.ts)}</span><button class="jrnl-menu-btn" onclick="openJournalMenu('${j.id}')">···</button></div></div>`).join('');

}

// ════════════════════════════════
//  前進の翻訳
// ════════════════════════════════
const MILESTONES=[7,30,90,180,365];
const MILESTONE_TITLES={7:'あなたが歩いてきた7日',30:'あなたが積み上げた30日',90:'あなたが変わり始めた90日',180:'あなたが続けてきた半年',365:'あなたが起こしてきた1年'};

// 前進日数：前進ログまたはジャーナルを残した「ユニークな日」の数
function progressDays(){
  const days=new Set();
  S.logs.forEach(l=>days.add(dk(new Date(l.ts))));
  S.journals.forEach(j=>{ if(j.kind!=='shift'&&j.kind!=='achieve') days.add(dk(new Date(j.ts))); });
  return days.size;
}

// 到達済みで未生成の最大マイルストーンを返す（なければnull）
function pendingMilestone(){
  const d=progressDays();
  let target=null;
  for(const m of MILESTONES){ if(d>=m && !(S.translations&&S.translations[m])) target=m; }
  return target;
}

function renderTranslation(){
  const sec=document.getElementById('translation-section');
  if(!sec) return;
  const days=progressDays();
  // 既に生成済みの翻訳のうち最大のものを表示
  const generated=Object.keys(S.translations||{}).map(Number).sort((a,b)=>b-a);
  const pending=pendingMilestone();

  if(pending){
    // 新しい節目に到達 → 生成
    sec.innerHTML=`<div class="translation"><div class="translation-card">
      <div class="translation-eyebrow">前進の翻訳</div>
      <div class="translation-title">${esc(MILESTONE_TITLES[pending])}</div>
      <div class="translation-loading" id="tr-loading">あなたが積み上げてきたものを、読み返しています…</div>
    </div></div>`;
    generateTranslation(pending);
    return;
  }

  if(generated.length){
    const m=generated[0];
    const t=S.translations[m];
    sec.innerHTML=`<div class="translation"><div class="translation-card">
      <div class="translation-eyebrow">前進の翻訳</div>
      <div class="translation-title">${esc(MILESTONE_TITLES[m])}</div>
      <div class="translation-body">${esc(t.text)}</div>
      <div class="translation-sign">— 前進の翻訳 ・ ${fmtYMD(t.ts)}</div>
    </div></div>`;
  } else {
    // まだ最初の節目（7日）に達していない
    const next=MILESTONES.find(m=>m>days)||7;
    sec.innerHTML=`<div class="translation"><div class="translation-card" style="background:none;border-color:var(--rule-2)">
      <div class="translation-eyebrow" style="color:var(--ink-4)">前進の翻訳</div>
      <div class="translation-body" style="text-align:center;color:var(--ink-3);font-size:13px">前進した日が${next}日に届いたとき、<br>あなたが積み上げてきたものの意味を、<br>ここで翻訳します。<br><br><span style="font-family:var(--mono);font-size:11px;color:var(--ink-4)">いま ${days}日 / ${next}日</span></div>
    </div></div>`;
  }
}

async function generateTranslation(milestone){
  // データ収集
  const days=progressDays();
  // 期間内のログを項目ごとに集計
  const cutoff=Date.now()-milestone*86400000;
  const agg={};
  S.logs.forEach(l=>{ if(l.ts>=cutoff){ if(!agg[l.item])agg[l.item]={count:0,total:0,unit:l.unit}; agg[l.item].count++; if(l.amount!=null)agg[l.item].total+=l.amount; } });
  const assetSummary=Object.keys(agg).map(n=>{const a=agg[n];return a.unit?`${n}：${fmtNum(a.total)}${a.unit}`:`${n}：${a.count}回`;}).join('、');
  // ジャーナル（感情）を時系列で
  const jrnls=S.journals.filter(j=>j.ts>=cutoff && j.kind!=='shift' && j.kind!=='achieve').map(j=>j.text);
  const jrnlSample=jrnls.slice(-8).join(' / ');
  const goalsTxt=(S.goals||[]).map(g=>g.text).concat((S.achievedGoals||[]).map(g=>'(達成)'+g.text)).join('、');
  const monthTxt=(S.monthFocuses||[]).map(f=>f.text).concat((S.achievedFocuses||[]).map(f=>'(達成)'+f.text)).join('、');

  let text=null;
  try {
    text = await callTranslationAPI({milestone, ideal:S.ideal, goals:goalsTxt, month:monthTxt, assets:assetSummary, journals:jrnlSample, days});
  } catch(e){ text=null; }
  if(!text){ text = fallbackTranslation({milestone, ideal:S.ideal, assets:assetSummary, journals:jrnls, days}); }

  if(!S.translations) S.translations={};
  S.translations[milestone]={text, ts:Date.now(), days};
  persist();
  renderTranslation();
}

async function callTranslationAPI(d){
  const sys=`あなたはOKOSOというアプリの「前進の翻訳」機能です。OKOSOは「理想の人生」と「今日の行動」を繋ぎ続ける伴走者です。

あなたの唯一の役割は、ユーザーが積み上げた行動の「意味」を翻訳することです。

絶対の禁止事項：
- 褒めない。励まさない。評価しない。採点しない。説教しない。
- 「素晴らしい」「成長しています」「頑張りましょう」「継続は力なり」「夢は叶う」のような、誰にでも当てはまる言葉を使わない。
- 「何をしたか」を説明しない。「なぜそれが意味を持つのか」を翻訳する。

口調：
- 静か、誠実、断定しない、過剰に熱くしない。
- 先生・コーチ・親・友達にならない。
- 「未来の自分から届く手紙」のような温度感。

文体：
- 200〜300字程度。改行を使い、ゆっくりした余白のある文章。
- ユーザーの理想と、実際に積み上げた行動・感情を結びつける。
- ジャーナルに迷いや疲れがあれば、それでも手を止めなかった事実を静かに指摘する。

成功条件：読んだuser が「そうか、俺が積み上げていたのはただの作業じゃなかったんだな」と思えること。`;

  const userMsg=`節目：前進した日が${d.milestone}日に到達。
理想（目的）：${d.ideal||'(未設定)'}
目標：${d.goals||'(未設定)'}
今月の焦点：${d.month||'(未設定)'}
この期間に積み上げた前進ログ：${d.assets||'(記録なし)'}
この期間のジャーナル（感情の記録）：${d.journals||'(記録なし)'}

上記をもとに、「あなたが${d.milestone===180?'続けてきた半年':d.milestone===365?'起こしてきた1年':(d.milestone+'日')}」というタイトルにふさわしい「前進の翻訳」を書いてください。タイトルは出力に含めず、本文のみ。`;

  // Vercelのサーバーレス関数（/api/translate）をプロキシとして呼ぶ。
  // APIキーはサーバー側の環境変数に置き、ブラウザには出さない。
  const res=await fetch('/api/translate',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ system:sys, user:userMsg })
  });
  if(!res.ok) throw new Error('api');
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  if(!txt) throw new Error('empty');
  return txt;
}

// API不可時のフォールバック（テンプレートだが思想に忠実に）
function fallbackTranslation(d){
  const ideal=d.ideal||'';
  const hasJournalStruggle = (d.journals||[]).some(t=>/疲|しんど|意味|不安|やる気|辞め|やめ|難し|きつ/.test(t));
  const lines=[];
  if(d.assets){
    lines.push(`この${d.milestone}日であなたが積み上げたのは、${d.assets}でした。`);
  } else {
    lines.push(`この${d.milestone}日、あなたは前進を残し続けました。`);
  }
  lines.push('');
  lines.push('数字だけを見れば、小さな前進に見えるかもしれません。');
  if(ideal){
    lines.push(`しかしあなたの理想は「${ideal}」。`);
    lines.push(`積み上げたものは、その理想へ向かう道を途切れさせませんでした。`);
  } else {
    lines.push('それでも、前に進む手を止めなかった事実は残りました。');
  }
  lines.push('');
  if(hasJournalStruggle){
    lines.push('ジャーナルには、疲れや迷いの言葉も残されていました。');
    lines.push('それでも手を止めなかった日が、ここに積み上がっています。');
    lines.push(`この${d.milestone}日は、成果よりも継続を選んだ日々でした。`);
  } else {
    lines.push(`大きく進んだ日ばかりではないかもしれません。`);
    lines.push('それでも、理想から離れなかった事実が、ここに残りました。');
  }
  return lines.join('\n');
}

let calMonth=new Date();
function calMove(d){ calMonth.setMonth(calMonth.getMonth()+d); renderCalendar(); }
function renderCalendar(){
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  document.getElementById('cal-title').textContent=`${y}年 ${m+1}月`;
  document.getElementById('cal-dows').innerHTML=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  // その月の記録がある日
  const marks={};
  [...S.logs, ...S.journals].forEach(x=>{ const d=new Date(x.ts); if(d.getFullYear()===y&&d.getMonth()===m) marks[d.getDate()]=true; });
  Object.keys(S.steps).forEach(key=>{ const [yy,mm,dd]=key.split('-').map(Number); if(yy===y&&mm-1===m&&S.steps[key].length) marks[dd]=true; });
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const todayKey=dk();
  let html='';
  for(let i=0;i<first;i++) html+='<button class="cal-cell" disabled></button>';
  for(let day=1;day<=days;day++){
    const key=`${y}-${('0'+(m+1)).slice(-2)}-${('0'+day).slice(-2)}`;
    const has=marks[day];
    html+=`<button class="cal-cell${has?' has':''}${key===todayKey?' today-cell':''}" onclick="showDay('${key}')"><span>${day}</span>${has?'<span class="cal-mark"></span>':''}</button>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  document.getElementById('cal-detail').innerHTML='';
}
function showDay(key){
  const [y,m,d]=key.split('-').map(Number);
  const logs=S.logs.filter(l=>dk(new Date(l.ts))===key);
  const allJrnls=S.journals.filter(j=>dk(new Date(j.ts))===key);
  const shifts=allJrnls.filter(j=>j.kind==='shift');
  const jrnls=allJrnls.filter(j=>j.kind!=='shift');
  const allSteps=(S.steps[key]||[]);
  const el=document.getElementById('cal-detail');
  if(!logs.length&&!allJrnls.length&&!allSteps.length){
    el.innerHTML=`<div class="cal-detail-date">${y}年${m}月${d}日</div><div class="empty-msg" style="padding-top:0">この日の記録はありません。</div>`;
    return;
  }
  let html=`<div class="cal-detail-date">${y}年${m}月${d}日</div>`;
  // 方向転換（人生の節目）を最上部に
  if(shifts.length){
    html+=shifts.map(s=>{
      const h=S.idealHistory&&S.idealHistory.find(x=>x.ts===s.ts);
      return `<div class="shift-card">
        <div class="shift-card-label">人生の方向転換</div>
        ${h?`<div class="shift-flow"><span class="shift-from">${esc(h.from)}</span><span class="shift-arrow">▼</span><span class="shift-to">${esc(h.to)}</span></div>`
            :`<div class="jrnl-text">${esc(s.text)}</div>`}
        <div class="shift-note">理想が変わることは、失敗ではなく、人生の変化。</div>
      </div>`;
    }).join('');
  }
  // 今日の一歩（完了／未達／延期／終了を区別）
  if(allSteps.length){
    html+=`<div class="label">今日の一歩</div>`;
    html+=allSteps.map(s=>{
      let status, cls;
      if(s.done){ status='完了'; cls='done'; }
      else if(s.carried){ status='延期'; cls='carry'; }
      else if(s.ended){ status='終了'; cls='end'; }
      else { status='未達'; cls='unmet'; }
      return `<div class="step-archive-row">
        <span class="step-archive-text${s.done?'':' undone'}">${esc(s.text)}</span>
        <span class="step-status step-status-${cls}">${status}</span>
      </div>`;
    }).join('');
  }
  if(logs.length){
    html+=`<div class="label" style="margin-top:24px">前進記録</div>`;
    html+=logs.map(l=>`<div class="recent-entry"><div class="recent-day">${('0'+new Date(l.ts).getHours()).slice(-2)}:${('0'+new Date(l.ts).getMinutes()).slice(-2)}</div><div class="recent-text">${esc(l.item)}${l.amount!=null?` ${fmtNum(l.amount)}${esc(l.unit||'')}`:''}</div></div>`).join('');
  }
  if(jrnls.length){
    html+=`<div class="label" style="margin-top:24px">ジャーナル</div>`;
    html+=jrnls.map(j=>`<div class="jrnl-card"><div class="jrnl-text" style="white-space:pre-wrap">${esc(j.text)}</div></div>`).join('');
  }
  el.innerHTML=html;
}

  }
  if(stage==='pain3'){
    onbInputStep({eyebrow:'3 / 4',q:'その悩みがなくなったら、<br>どんな毎日になっていたいですか？',sub:'状態ではなく、理想の日常を。',
      ph:'例：家族と夕食を食べたい、心に余裕を持ちたい',value:onbDraft.idealDailyLife,multiline:true,dotIndex:2,dotTotal:4,
      onNext:`()=>onbSave('idealDailyLife','summary')`});
    return;
  }

  // ── STEP5：AI要約（翻訳者として）──
  if(stage==='summary'){
    onbShow(`
      <div class="onb-step-eyebrow">4 / 4</div>
      <div class="onb-q">あなたが向かいたい姿</div>
      <div class="onb-sub" id="summary-loading">あなたの言葉を、整理しています…</div>
      <div id="summary-body" style="display:none">
        <div class="onb-summary-card" id="summary-text"></div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:18px">
          <button class="onb-btn" onclick="onbNext('goal2')">この内容で進む</button>
          <button class="onb-btn ghost" onclick="onbEditSummary()">編集する</button>
        </div>
      </div>`);
    generateIdealSummary();
    return;
  }

  // ── STEP6〜8：取り組みたいこと / 今日の一歩 / 今月の焦点 ──
  if(stage==='goal2'){
    onbInputStep({eyebrow:'取り組みたいこと',q:'その理想に近づくために、<br>今後取り組んでいきたいことは？',sub:'肩肘張らず、自然に答えてください。',
      ph:'例：Web制作を学ぶ、副業を始める、読書習慣をつける',value:onbDraft.goal,dotIndex:0,dotTotal:0,
      onNext:`()=>onbSave('goal','step2')`});
    return;
  }
  if(stage==='step2'){
    onbInputStep({eyebrow:'今日の一歩',q:'その取り組みに向かって、<br>今日できる小さな一歩は？',sub:'絶対に、小さくていい。',
      ph:'例：本を10ページ読む、10分歩く',value:onbDraft.step,dotIndex:0,dotTotal:0,
      onNext:`()=>onbSave('step','month2')`});
    return;
  }
  if(stage==='month2'){
    onbInputStep({eyebrow:'今月の焦点',q:'今日の一歩を積み重ねた先で、<br>今月末にはどんな状態に<br>なっていたいですか？',sub:'積み重ねの先にある状態を。',
      ph:'例：本を1冊読み終える、副業候補を3つ調べる',value:onbDraft.month,dotIndex:0,dotTotal:0,
      onNext:`()=>onbSave('month','done')`});
    return;
  }

  // ── 完了 ──
  if(stage==='done'){
    const idealShown = onbDraft.idealSummary || onbDraft.ideal;
    onbShow(`
      <div class="onb-step-eyebrow">準備完了</div>
      <div style="margin-bottom:30px">
        <div class="onb-done-line">理想　<span class="v">${esc(idealShown||'—')}</span></div>
        <div class="onb-done-line">取り組み　<span class="v">${esc(onbDraft.goal||'—')}</span></div>
        <div class="onb-done-line">今月　<span class="v">${esc(onbDraft.month||'—')}</span></div>
        <div class="onb-done-line">今日　<span class="v">${esc(onbDraft.step||'—')}</span></div>
      </div>
      <div class="onb-sub" style="margin-bottom:30px">あとは、進むだけ。</div>
      <button class="onb-btn" onclick="onbFinish()">OKOSOを始める</button>`);
    return;
  }
}

function selectPainCategory(cat){
  onbDraft.painCategory=cat;
  onbNext('pain2');
}

function onbSave(key,next){
  const v=(document.getElementById('onb-inp').value||'').trim();
  onbDraft[key]=v;
  onbNext(next);
}

function onbEditSummary(){
  onbInputStep({eyebrow:'4 / 4 ・ 編集',q:'あなたが向かいたい姿',sub:'あなた自身の言葉に直してください。',
    ph:'あなたが向かいたい姿', value:onbDraft.idealSummary, multiline:true, dotIndex:3, dotTotal:4,
    onNext:`()=>onbSave('idealSummary','goal2')`});
}

// AIは翻訳者：ユーザーの言葉を整理するだけ。夢を足さない、理想を作らない、人生を決めない。
async function generateIdealSummary(){
  let summary=null;
  try{
    summary=await callIdealSummaryAPI({
      category:onbDraft.painCategory, moment:onbDraft.painMoment, dailyLife:onbDraft.idealDailyLife
    });
  }catch(e){ summary=null; }
  if(!summary){
    // フォールバック：ユーザーの言葉をそのまま繋げるだけ（AIが夢を足さない原則を守る）
    summary = onbDraft.idealDailyLife
      ? `${onbDraft.idealDailyLife}`
      : `${onbDraft.painCategory}について、もっと違う毎日を生きたい`;
  }
  onbDraft.idealSummary=summary;
  const loading=document.getElementById('summary-loading');
  const body=document.getElementById('summary-body');
  const text=document.getElementById('summary-text');
  if(loading) loading.style.display='none';
  if(text) text.textContent=summary;
  if(body) body.style.display='block';
}

async function callIdealSummaryAPI(d){
  const sys=`あなたはOKOSOというアプリの、理想を言語化するための「翻訳者」です。

絶対の禁止事項：
- ユーザーが言っていないことを足さない。夢を作らない。理想を勝手に作らない。人生を決めない。
- 説教しない。評価しない。アドバイスしない。
- あなたの役割は、ユーザー自身の言葉を整理して、短い一文〜二文にまとめることだけです。

出力ルール：
- 60〜90字程度の日本語、一人称は使わず「〜生きられる人生」「〜大切にしながら〜できる毎日」のような体言止め寄りの文体。
- ユーザーが読んだ時に「それだ、俺が言いたかったのはそれだ」と思える、ユーザー自身の言葉に近い要約にする。
- 説明や前置きは書かず、要約の本文だけを出力する。`;

  const userMsg=`このユーザーが最も変えたいこと：${d.category||'(未回答)'}
その悩みを強く感じる時：${d.moment||'(未回答)'}
悩みがなくなったらどんな毎日になっていたいか：${d.dailyLife||'(未回答)'}

上記から、「あなたが向かいたい姿」というタイトルにふさわしい一文〜二文の要約だけを出力してください。`;

  const res=await fetch('/api/translate',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ system:sys, user:userMsg })
  });
  if(!res.ok) throw new Error('api');
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  if(!txt) throw new Error('empty');
  return txt;
}

function onbFinish(){
  S.ideal = onbDraft.idealSummary || onbDraft.ideal || '';
  S.goals = onbDraft.goal ? [{id:uid(),text:onbDraft.goal}] : [];
  S.monthFocuses = onbDraft.month ? [{id:uid(),text:onbDraft.month}] : [];
  const focusTag = onbDraft.month||'';
  if(onbDraft.step){ todaySteps().push({id:uid(),text:onbDraft.step,tag:focusTag,done:false}); }
  S.onboarded=true;
  persist();
  renderFlow();
  const o=document.getElementById('onb');
  if(o){ o.classList.remove('show'); setTimeout(()=>document.getElementById('onb-mount').innerHTML='',500); }
}

// ════════════════════════════════
//  同期設定シート
// ════════════════════════════════
function openSyncSheet(){
  const on=sync.enabled&&sync.token&&sync.gistId;
  const status = on
    ? `<div class="sync-status on">同期は有効です${sync.lastSync?`<br><span style="color:var(--ink-4);font-size:11px">最終同期：${fmtSyncTime(sync.lastSync)}</span>`:''}</div>`
    : `<div class="sync-status">この端末はまだ同期していません。</div>`;

  const body = on
    ? `${status}
      <p style="font-family:var(--serif);font-size:12px;color:var(--ink-3);line-height:1.9;margin:16px 0 8px">この端末は、あなたのGistと繋がっています。<br>スマホでもPCでも、同じTokenとGist IDを入れれば、記録が共有されます。</p>
      <label class="field-lbl" style="margin-top:14px">Gist ID（他の端末で使う）</label>
      <div class="field-box" style="display:flex;align-items:center;gap:8px">
        <input type="text" id="sync-gist-show" readonly value="${esc(sync.gistId)}" style="flex:1">
        <button class="sync-copy" onclick="copyGistId()">コピー</button>
      </div>
      <div class="sheet-btns" style="flex-direction:column;gap:8px;margin-top:14px">
        <button class="sbtn sbtn-p" onclick="doSyncNow()" style="width:100%">今すぐ同期する</button>
        <button class="sbtn" onclick="disableSync()" style="width:100%;color:var(--ink-3)">この端末の同期を解除</button>
        <button class="sbtn" onclick="closeModal()" style="width:100%">閉じる</button>
      </div>`
    : `${status}
      <p style="font-family:var(--serif);font-size:12px;color:var(--ink-3);line-height:1.9;margin:14px 0 18px">GitHubの無料機能（Gist）に、あなたの記録をJSONで保存します。<br>スマホとPCで同じ記録が見られるようになります。月額0円です。</p>
      <label class="field-lbl">GitHub Personal Access Token</label>
      <div class="field-box"><input type="password" id="sync-token" placeholder="ghp_... （gistスコープのみ）"></div>
      <p style="font-family:var(--serif);font-size:11px;color:var(--ink-4);line-height:1.8;margin:-8px 0 16px">GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) で発行。スコープは <span style="color:var(--ember)">gist</span> だけにチェック。</p>
      <label class="field-lbl">Gist ID（2台目以降のみ・1台目は空欄）</label>
      <div class="field-box"><input type="text" id="sync-gistid" placeholder="空欄なら新規に作成します"></div>
      <div class="sheet-btns" style="margin-top:6px">
        <button class="sbtn" onclick="closeModal()">閉じる</button>
        <button class="sbtn sbtn-p" onclick="doEnableSync()">同期を始める</button>
      </div>`;

  openSheet(`<h2>端末間で記録を同期</h2>${body}`);
}

function fmtSyncTime(ts){ const d=new Date(ts); return `${('0'+(d.getMonth()+1)).slice(-2)}/${('0'+d.getDate()).slice(-2)} ${('0'+d.getHours()).slice(-2)}:${('0'+d.getMinutes()).slice(-2)}`; }

function copyGistId(){
  const inp=document.getElementById('sync-gist-show');
  if(inp){ inp.select(); try{document.execCommand('copy');}catch(e){} navigator.clipboard&&navigator.clipboard.writeText(inp.value).catch(()=>{}); quietToast('Gist IDをコピーしました'); }
}

async function doEnableSync(){
  const token=(document.getElementById('sync-token').value||'').trim();
  const gistId=(document.getElementById('sync-gistid').value||'').trim();
  if(!token){ quietToast('Tokenを入力してください'); return; }
  quietToast('接続しています…');
  try{
    const id=await enableSync(token, gistId);
    closeModal();
    quietToast(gistId?'同期しました':'新しいGistを作成して同期しました');
  }catch(e){
    quietToast('接続に失敗しました。Tokenを確認してください');
  }
}

async function doSyncNow(){
  quietToast('同期しています…');
  try{ await syncNow(); quietToast('同期しました'); closeModal(); }
  catch(e){ quietToast('同期に失敗しました'); }
}

function disableSync(){
  sync={ token:'', gistId:'', enabled:false, lastSync:0 };
  saveSync(); updateSyncBadge('off'); closeModal();
  quietToast('この端末の同期を解除しました');
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
function init(){
  load();
  loadSync();
  document.getElementById('md1').textContent=fmtDate();
  document.getElementById('md2').textContent=fmtDate();
  renderFlow(); renderAssetChips();
  const jf=document.getElementById('jrnl-field');
  jf.addEventListener('input',()=>{autosize(jf);document.getElementById('jrnl-keep').classList.toggle('on',jf.value.trim().length>0);});
  const ai=document.getElementById('amt-inp');
  ai.addEventListener('input',()=>{document.getElementById('log-keep').classList.toggle('on',true);});
  ai.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doKeepLog();}});
  // 同期が有効なら起動時にpull+merge
  if(sync.enabled&&sync.token&&sync.gistId){
    updateSyncBadge('ok');
    syncNow().catch(()=>updateSyncBadge('error'));
  } else {
    updateSyncBadge('off');
  }
  if(!S.onboarded) startOnboarding();
  else checkUnmetTasks();
}

// ════════════════════════════════
//  未達タスクの引き継ぎ（日付切り替え時）
// ════════════════════════════════
function checkUnmetTasks(){
  const today=dk();
  if(S.lastRolloverCheck===today) return;   // 今日はもう確認済み
  // 過去の日付で、未達成（done=false）のタスクを集める
  const unmet=[];
  Object.keys(S.steps||{}).forEach(key=>{
    if(key>=today) return;   // 今日以降は対象外
    (S.steps[key]||[]).forEach(s=>{ if(!s.done && !s.carried && !s.ended) unmet.push({...s, fromDate:key}); });
  });
  if(!unmet.length){ S.lastRolloverCheck=today; persist(); return; }
  showUnmetDialog(unmet);
}

function showUnmetDialog(unmet){
  // 1件ずつ意思決定してもらう
  let idx=0;
  const renderOne=()=>{
    if(idx>=unmet.length){
      S.lastRolloverCheck=dk();
      persist(); renderFlow();
      const o=document.getElementById('onb-mount'); if(o) o.innerHTML='';
      return;
    }
    const t=unmet[idx];
    const m=document.getElementById('onb-mount');
    m.innerHTML=`<div class="onb show" id="unmet-veil"><div class="onb-inner">
      <div class="onb-step-eyebrow">前の日に、できなかったこと</div>
      <div class="unmet-task-card">${esc(t.text)}</div>
      <div class="onb-sub" style="margin:18px 0 22px">できなかった日も、人生の一部です。<br>どうするか、あなたが決めてください。</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="onb-btn" onclick="decideUnmet(${idx},'carry')">明日に引き継ぐ</button>
        <button class="onb-btn ghost" onclick="decideUnmet(${idx},'reflect')">振り返りを残す</button>
        <button class="onb-btn ghost" onclick="decideUnmet(${idx},'end')">今はやらないと決める</button>
      </div>
      ${unmet.length>1?`<div class="onb-progress">${unmet.map((_,n)=>`<div class="onb-dot${n===idx?' on':''}"></div>`).join('')}</div>`:''}
    </div></div>`;
  };
  window.decideUnmet=(i,decision)=>{
    const t=unmet[i];
    // 元タスクに印をつける
    const arr=S.steps[t.fromDate]||[];
    const orig=arr.find(s=>s.id===t.id);
    if(decision==='carry'){
      if(orig) orig.carried=true;
      // 今日に引き継ぐ
      const ts=todaySteps();
      ts.push({id:uid(), text:t.text, tag:t.tag||'', done:false});
      S.stepDecisions.push({id:uid(), text:t.text, date:t.fromDate, decision:'carry', ts:Date.now()});
      idx++; renderOne();
    } else if(decision==='end'){
      if(orig) orig.ended=true;
      S.stepDecisions.push({id:uid(), text:t.text, date:t.fromDate, decision:'end', ts:Date.now()});
      idx++; renderOne();
    } else if(decision==='reflect'){
      // 振り返り入力へ
      const m=document.getElementById('onb-mount');
      m.innerHTML=`<div class="onb show"><div class="onb-inner">
        <div class="onb-step-eyebrow">振り返りを残す</div>
        <div class="unmet-task-card">${esc(t.text)}</div>
        <div class="onb-sub" style="margin:16px 0 14px">なぜできなかったか、書いておきますか。</div>
        <textarea class="onb-input" id="unmet-reflect" rows="3" style="resize:none;line-height:1.7" placeholder="例：疲れていて手がつかなかった"></textarea>
        <button class="onb-btn" onclick="saveUnmetReflection(${i})" style="margin-top:14px">残す</button>
      </div></div>`;
      setTimeout(()=>document.getElementById('unmet-reflect')?.focus(),300);
    }
  };
  window.saveUnmetReflection=(i)=>{
    const t=unmet[i];
    const v=(document.getElementById('unmet-reflect').value||'').trim();
    const arr=S.steps[t.fromDate]||[];
    const orig=arr.find(s=>s.id===t.id);
    if(orig) orig.ended=true;
    S.stepDecisions.push({id:uid(), text:t.text, date:t.fromDate, decision:'reflect', reflection:v, ts:Date.now()});
    if(v) S.journals.push({id:uid(), text:`「${t.text}」はできなかった。\n${v}`, ts:Date.now()});
    idx++; renderOne();
  };
  renderOne();
}
// keepLogボタンは doKeepLog を呼ぶ
window.keepLog=doKeepLog;
init();
</script>
